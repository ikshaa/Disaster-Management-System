# Render Blueprint — one-click deploy for Rescue-AI
# Use: New → Blueprint → connect this repo → Render builds both services automatically

services:
  # ─── Backend (FastAPI AI hub) ───────────────────────────────
  - type: web
    name: rescue-ai-backend
    runtime: python
    plan: free
    branch: feature/ai-models
    rootDir: backend
    buildCommand: >-
      pip install -r requirements.txt &&
      python -c "
      import os, shutil;
      from huggingface_hub import hf_hub_download, snapshot_download;
      os.makedirs('../ai-models/outputs', exist_ok=True);
      p = hf_hub_download('nehagdd/rescue-ai-models', 'resnet50/best_model.pt');
      shutil.copy(p, '../ai-models/outputs/best_model.pt');
      print('ResNet50 ready');
      marker = '../model/models/distilbert_crisis_classifier/model.safetensors';
      os.makedirs('../model/models', exist_ok=True);
      snapshot_download('nehagdd/rescue-ai-models', allow_patterns='distilbert/*', local_dir='../model/models');
      dl = '../model/models/distilbert';
      dest = '../model/models/distilbert_crisis_classifier';
      os.path.isdir(dl) and not os.path.isdir(dest) and shutil.move(dl, dest);
      print('DistilBERT ready');
      "
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /

  # ─── Frontend (React dashboard, static site) ────────────────
  - type: web
    name: rescue-ai-frontend
    runtime: static
    branch: feature/ai-models
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      # Set this in Render dashboard AFTER backend deploys —
      # paste backend's URL like https://rescue-ai-backend.onrender.com
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
